{{ define "main" }}
<section class="shell page-head admin-head">
    <a class="back-link" href="{{ "admin/" | relURL }}">← Back</a>
    <h1>{{ .Title }}</h1>
    <div class="page-summary">
        <p>Create a post directly on the website.</p>
    </div>
</section>

<section
    class="shell dynamic-admin"
    id="dynamic-editor"
    data-supabase-url="{{ .Site.Params.supabaseUrl }}"
    data-supabase-key="{{ .Site.Params.supabaseAnonKey }}"
    data-storage-bucket="{{ .Site.Params.supabaseStorageBucket }}"
    data-login-url="{{ "admin/" | relURL }}"
>
    <form class="post-form dynamic-post-form" id="dynamic-post-form" hidden>
        <div class="image-helper-head">
            <span id="editor-mode-label">New post</span>
            <button type="button" id="logout-button">Log out</button>
        </div>
        <input id="dynamic-edit-id" type="hidden">
        <input id="dynamic-current-slug" type="hidden">

        <label>
            <span>Title</span>
            <input id="dynamic-title" type="text" placeholder="Observation Night Recap" autocomplete="off" required>
        </label>

        <div class="form-grid">
            <label>
                <span>Author</span>
                <input id="dynamic-author" type="text" placeholder="HCNY Astronomy" autocomplete="off">
            </label>
            <label>
                <span>Publish</span>
                <select id="dynamic-published">
                    <option value="true">Published</option>
                    <option value="false">Draft</option>
                </select>
            </label>
        </div>

        <label>
            <span>Summary</span>
            <input id="dynamic-summary" type="text" placeholder="Short description for the posts page" autocomplete="off">
        </label>

        <label>
            <span>Tags</span>
            <input id="dynamic-tags" type="text" placeholder="olympiad, observation, lesson" autocomplete="off">
        </label>

        <label>
            <span>Body</span>
            <textarea id="dynamic-body" rows="14" placeholder="Write the post here. Markdown-style paragraphs, links, and images work." required></textarea>
        </label>

        <div class="image-helper">
            <label>
                <span>Picture</span>
                <input id="dynamic-image" type="file" accept="image/*">
            </label>
            <label>
                <span>Picture alt text</span>
                <input id="dynamic-image-alt" type="text" placeholder="Students observing the night sky" autocomplete="off">
            </label>
            <div class="image-preview-wrap" id="dynamic-image-preview-wrap" hidden>
                <img id="dynamic-image-preview" alt="">
            </div>
        </div>

        <div class="builder-actions">
            <button type="submit" id="save-post-button">Publish post</button>
            <button type="button" id="clear-editor-button">New blank post</button>
            <a href="{{ "posts/" | relURL }}">View posts</a>
        </div>
        <p class="builder-status" id="dynamic-post-status"></p>
    </form>
    <p class="builder-status" id="editor-status">Checking login...</p>

    <section class="admin-post-manager" id="admin-post-manager" hidden>
        <div class="image-helper-head">
            <span>Existing dynamic posts</span>
            <button type="button" id="refresh-posts-button">Refresh</button>
        </div>
        <div class="admin-post-list" id="admin-post-list"></div>
    </section>
</section>
{{ end }}

{{ define "scripts" }}
    <script type="module" src="{{ "js/dynamic-posts.js" | relURL }}?v={{ now.Unix }}"></script>
{{ end }}
