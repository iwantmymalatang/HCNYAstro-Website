<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ .Site.Params.keywords }}">
    <meta name="theme-color" content="#070a12">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/hcny.css" | relURL }}?v={{ now.Unix }}">
</head>
<body>
    {{ partial "site-header.html" . }}
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
        <div class="shell footer-inner">
            <span>HCNY Astronomy</span>
            <span>Any problems, including post removal or reports, email <a href="mailto:hcnyastro@gmail.com">hcnyastro@gmail.com</a>.</span>
        </div>
    </footer>
    <script type="module" src="{{ "js/header-auth.js" | relURL }}?v={{ now.Unix }}"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
