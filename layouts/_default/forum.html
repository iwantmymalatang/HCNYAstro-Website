{{ define "main" }}
<section class="shell page-head forum-head">
    <a class="back-link" href="{{ .Site.Home.RelPermalink }}">← Back</a>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-summary">{{ . }}</div>{{ end }}
</section>

<section
    class="shell forum-app"
    id="forum-app"
    data-supabase-url="{{ .Site.Params.supabaseUrl }}"
    data-supabase-key="{{ .Site.Params.supabaseAnonKey }}"
>
    <div class="forum-toolbar">
        <div class="forum-tabs" role="tablist" aria-label="Forum categories">
            <button type="button" class="is-active" data-forum-tab="guide">Guides and Documentation</button>
            <button type="button" data-forum-tab="question">Questions</button>
        </div>
        <div class="forum-account" id="forum-account">
            <button type="button" id="forum-new-post">New post</button>
        </div>
    </div>

    <form class="forum-settings-panel" id="forum-settings-panel" hidden>
        <div class="image-helper-head">
            <span>My settings</span>
            <button type="button" id="forum-settings-close">Close</button>
        </div>
        <label>
            <span>Username</span>
            <input id="forum-settings-username" type="text" autocomplete="nickname" placeholder="Display name">
        </label>
        <label class="toggle-row">
            <input id="forum-settings-notifications" type="checkbox">
            <span>Email me when new forum posts are published</span>
        </label>
        <button type="submit">Save</button>
        <p class="builder-status" id="forum-settings-status"></p>
    </form>

    <form class="post-form forum-compose" id="forum-compose" hidden>
        <div class="image-helper-head">
            <span>New forum post</span>
            <button type="button" id="forum-cancel-edit">Close</button>
        </div>
        <input id="forum-edit-id" type="hidden">
        <p class="forum-posting-as" id="forum-posting-as"></p>
        <label>
            <span>Type</span>
            <select id="forum-type">
                <option value="guide">Guides and Documentation</option>
                <option value="question">Questions</option>
            </select>
        </label>
        <label>
            <span>Title</span>
            <input id="forum-title" type="text" placeholder="AstroChallenge preparation notes" autocomplete="off" required>
        </label>
        <label>
            <span>Tags</span>
            <input id="forum-tags" type="text" placeholder="olympiad, mechanics, observation" autocomplete="off">
        </label>
        <label>
            <span>Content</span>
            <textarea id="forum-body" rows="10" placeholder="Write your guide, documentation, or question here." required></textarea>
        </label>
        <div class="builder-actions">
            <button type="submit" id="forum-submit">Publish to forum</button>
        </div>
        <p class="builder-status" id="forum-compose-status"></p>
    </form>

    <p class="builder-status" id="forum-status">Loading forum...</p>
    <div class="forum-list" id="forum-list"></div>
    <article class="forum-thread" id="forum-thread" hidden></article>
</section>
{{ end }}

{{ define "scripts" }}
<script type="module" src="{{ "js/forum.js" | relURL }}?v={{ now.Unix }}"></script>
{{ end }}
